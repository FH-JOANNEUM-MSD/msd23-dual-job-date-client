      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">Component Diagram</text>
  <text x="500" y="52" text-anchor="middle" font-size="11" fill="#555">Dual Job Dating — Kotlin Multiplatform App</text>

  <!-- composeApp boundary -->
