  <line x1="390" y1="205" x2="390" y2="265" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="610" y1="205" x2="610" y2="265" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="825" y1="205" x2="825" y2="265" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arrow)"/>

