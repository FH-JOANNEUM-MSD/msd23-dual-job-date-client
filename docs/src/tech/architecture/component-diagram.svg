  <text x="157" y="418" text-anchor="middle" font-size="9" fill="#333">AppModule.kt</text>
  <text x="157" y="432" text-anchor="middle" font-size="9" fill="#333">Koin bindings</text>

  <rect x="250" y="385" width="165" height="60" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="332" y="403" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">core/navigation</text>
