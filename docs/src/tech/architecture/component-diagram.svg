  <text x="55" y="100" font-size="10" font-weight="700" fill="#1A1A1A" letter-spacing="0.06em">COMPOSEAPP · commonMain</text>

  <!-- UI Layer -->
  <rect x="60" y="115" width="880" height="100" rx="4" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
