  <rect x="180" y="585" width="280" height="60" rx="4" fill="#ffffff" stroke="#1A1A1A" stroke-width="1"/>
  <text x="320" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Supabase</text>
  <text x="320" y="620" text-anchor="middle" font-size="9.5" fill="#333">Auth (JWT) · PostgREST · Storage</text>
  <text x="320" y="635" text-anchor="middle" font-size="9" fill="#555">SUPABASE_URL · ANON_KEY</text>

  <rect x="540" y="585" width="280" height="60" rx="4" fill="#ffffff" stroke="#1A1A1A" stroke-width="1"/>
  <text x="680" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Backend API (Go)</text>
