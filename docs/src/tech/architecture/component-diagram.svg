  <text x="332" y="432" text-anchor="middle" font-size="9" fill="#333">@Serializable</text>

  <rect x="425" y="385" width="165" height="60" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
