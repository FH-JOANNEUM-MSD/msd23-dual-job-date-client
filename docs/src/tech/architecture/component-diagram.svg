  <text x="507" y="432" text-anchor="middle" font-size="9" fill="#333">Bearer auth · JSON</text>

  <rect x="600" y="385" width="165" height="60" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="682" y="403" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">core/session</text>
  <text x="682" y="418" text-anchor="middle" font-size="9" fill="#333">SessionManager</text>
  <text x="682" y="432" text-anchor="middle" font-size="9" fill="#333">Multiplatform Settings</text>

  <rect x="775" y="385" width="150" height="60" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="850" y="403" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">core/ui</text>
  <text x="850" y="418" text-anchor="middle" font-size="9" fill="#333">Theme · Typography</text>
  <text x="850" y="432" text-anchor="middle" font-size="9" fill="#333">Shared components</text>

  <!-- Platform shims -->
  <rect x="60" y="475" width="880" height="65" rx="4" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="75" y="493" font-size="10" font-weight="700" fill="#1A1A1A" letter-spacing="0.05em">PLATFORM</text>

  <rect x="75" y="503" width="425" height="30" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="287" y="522" text-anchor="middle" font-size="10" fill="#1A1A1A"><tspan font-weight="700">androidMain</tspan> · MainActivity · OkHttp engine · NativeDialog</text>

  <rect x="510" y="503" width="415" height="30" rx="3" fill="#ffffff" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="717" y="522" text-anchor="middle" font-size="10" fill="#1A1A1A"><tspan font-weight="700">iosMain</tspan> · MainViewController · Darwin engine</text>

