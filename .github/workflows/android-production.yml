name: Build & Deploy to Closed Testing

on:
  push:
    branches: [ android-production ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }}" >> local.properties
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Download dependencies
        run: ./gradlew --no-daemon dependencies

      - name: Write keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore.b64
          base64 -d keystore.b64 > keystore-release.jks
          ls -la keystore-release.jks

      - name: Update version code
        run: |
          echo "VERSION_CODE=$((3000 + $GITHUB_RUN_NUMBER))" >> $GITHUB_ENV

      - name: Build Release Bundle (Production)
        run: |
          echo "Building with VERSION_CODE: ${{ env.VERSION_CODE }}"
          ./gradlew --no-daemon bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore-release.jks \
            -Pandroid.injected.signing.store.password='${{ secrets.KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.KEY_PASSWORD }}' \
            -PversionCode=${{ env.VERSION_CODE }} \
            -PisProduction=true

      - name: Upload to Play Store Closed Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: fh.msd
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: alpha
          status: completed

      - name: Clean up
        if: always()
        run: rm -f keystore-release.jks keystore.b64
