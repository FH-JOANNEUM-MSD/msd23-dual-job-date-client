name: Build, Test & Deploy to Play Console

on:
  push:
    branches: [ android-production ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download dependencies
        run: ./gradlew --no-daemon dependencies

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run Android instrumented tests
        run: ./gradlew connectedAndroidTest --no-daemon || echo "No instrumented tests or emulator not available"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Write keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore.b64
          base64 -d keystore.b64 > keystore.jks
          ls -la keystore.jks

      - name: Update version code
        run: |
          echo "VERSION_CODE=$((1000 + $GITHUB_RUN_NUMBER))" >> $GITHUB_ENV

      - name: Build Release Bundle
        run: |
          echo "Building with VERSION_CODE: ${{ env.VERSION_CODE }}"
          ./gradlew --no-daemon bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
            -Pandroid.injected.signing.store.password='${{ secrets.KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.KEY_PASSWORD }}' \
            -PversionCode=${{ env.VERSION_CODE }}

      - name: Upload to Play Store Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: fh.msd
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: draft

      - name: Clean up
        if: always()
        run: rm -f keystore.jks keystore.b64